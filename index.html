<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stream Studio Pro PWA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
          .then(() => console.log('Service Worker Activo'))
          .catch(err => console.log('Error de SW', err));
      }
    </script>
</head>
<body>

    <div class="app-container">
        
        <div class="monitor-container">
            <div class="monitor-box">
                <span class="monitor-label preview-label">PREVIEW (PREPARANDO)</span>
                <canvas id="canvasPreview" width="1280" height="720"></canvas>
            </div>
            <div class="monitor-box">
                <span class="monitor-label live-label">PROGRAM (EN VIVO)</span>
                <canvas id="canvasLive" width="1280" height="720"></canvas>
            </div>
        </div>

        <div class="controls-container">
    
    <div class="banner-selectors">
        <div class="selector-box">
            <label for="uploadBanner">Multimedia de la Escena:</label>
            <input type="file" id="uploadBanner" accept="image/png" onchange="cargarBannerEscena(event)">
        </div>

        <div class="selector-box">
            <label for="streamUrl">URL / Clave de Transmisión (Facebook):</label>
            <input type="text" id="streamUrl" placeholder="rtmp://live-api-s.facebook.com:80/rtmp/..." style="background: rgba(0,0,0,0.2); border: 1px solid #444; color: #fff; padding: 2px 5px; border-radius: 4px;">
        </div>
    </div>

    <div class="panel-distribucion">
        
        <div class="bloque-escenas">
            <h4>Escenas de la Iglesia</h4>
            <div class="grid-calculadora">
                <button onclick="cambiarPreview('camara_limpia')">E1: Cámara</button>
                <button onclick="cambiarPreview('escena_2')">E2: Banner</button>
                <button onclick="cambiarPreview('escena_3')">E3: Versículo</button>
                <button onclick="cambiarPreview('escena_4')">E4: Anuncios</button>
                <button onclick="cambiarPreview('escena_5')">E5: Despedida</button>
            </div>
        </div>

        <div class="bloque-emision" style="flex: 1; display: flex; flex-direction: column; gap: 6px;">
            <h4 style="font-size: 0.65rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px;">Control de Red</h4>
            <button id="btnIniciarStream" onclick="conmutarTransmision()" style="flex: 1; background: linear-gradient(135deg, #dc3545, #a71d2a); color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 0.8rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px;">
                <span id="iconoStream">🔴</span> <span id="textoStream">INICIAR EN VIVO</span>
            </button>
        </div>

        <div class="bloque-transicion">
            <button id="btnTransicionVertical" onclick="pasarAEnVivo()">
                <span>▲</span>
                <span>CORTE MASTER</span>
                <span>▲</span>
            </button>
        </div>

    </div>
</div>
    <video id="videoOculto" autoplay playsinline muted style="display:none;"></video>

    <script src="app.js"></script>
</body>
</html>
