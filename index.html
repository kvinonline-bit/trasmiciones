<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stream Studio Pro PWA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
          .then(() => console.log('Service Worker Activo'))
          .catch(err => console.log('Error de SW', err));
      }
    </script>
</head>
<body>

    <div class="app-container">
        
        <div class="monitor-container">
            <div class="monitor-box">
                <span class="monitor-label preview-label">PREVIEW (PREPARANDO)</span>
                <canvas id="canvasPreview" width="1280" height="720"></canvas>
            </div>
            <div class="monitor-box">
                <span class="monitor-label live-label">PROGRAM (EN VIVO)</span>
                <canvas id="canvasLive" width="1280" height="720"></canvas>
            </div>
        </div>

        <div class="controls-container">
            
            <div class="banner-selectors">
                <div class="selector-box">
                    <label for="uploadBanner1">Banner 1:</label>
                    <input type="file" id="uploadBanner1" accept="image/png" onchange="cargarBanner(event, 1)">
                </div>
                <div class="selector-box">
                    <label for="uploadBanner2">Banner 2:</label>
                    <input type="file" id="uploadBanner2" accept="image/png" onchange="cargarBanner(event, 2)">
                </div>
            </div>

            <div class="panel-distribucion">
                
                <div class="bloque-escenas">
                    <div class="grid-calculadora">
                        <button onclick="cambiarPreview('camara_limpia')">E1: Limpia</button>
                        <button onclick="cambiarPreview('camara_banner_1')">E2: Ban 1</button>
                        <button onclick="cambiarPreview('camara_banner_2')">E3: Ban 2</button>
                        <button onclick="cambiarPreview('camara_banner_3')">E4: Vacío</button>
                        <button onclick="cambiarPreview('camara_banner_4')">E5: Vacío</button>
                    </div>
                </div>

                <div class="bloque-transicion">
                    <button id="btnTransicionVertical" onclick="pasarAEnVivo()">
                        <span>▲</span>
                        <span>LIVE</span>
                        <span>▲</span>
                    </button>
                </div>

            </div>
        </div>
    </div>

    <video id="videoOculto" autoplay playsinline muted style="display:none;"></video>

    <script src="app.js"></script>
</body>
</html>
